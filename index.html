  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary:#1B5E20;
      --bg:#F4F6F3;
      --text:#1F1F1F;
      --cta:#FF9800;
    }

    body {
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    section {
      padding:35px 20px;
      text-align:center;
    }

    /* HERO */
    .hero {
      padding:35px 20px 25px;
      background: linear-gradient(180deg, #F4F6F3 0%, #FFFFFF 100%);
    }

    .hero-content {
      max-width:480px;
      margin:auto;
      transform: translateY(-10px);
    }

    .hero h1 {
      font-size:28px;
      font-weight:600;
      line-height:1.3;
      margin-bottom:6px;
    }

    .hero p {
      font-size:14px;
      color:#555;
      margin-bottom:12px;
    }

    /* BOTÃO */
    .botao {
      display:block;
      width:250px;
      margin:0 auto 15px;
      background:linear-gradient(135deg,#FF9800,#FF6F00);
      color:#fff;
      padding:12px 0;
      border-radius:8px;
      text-decoration:none;
      font-weight:600;
    }

    /* SLIDER */
    .slider-novo {
      width:250px;
      margin:15px auto 0;
      position:relative;
    }

    .slider-novo img {
      width:100%;
      border-radius:10px;
    }

    .slider-label {
      position:absolute;
      top:6px;
      left:6px;
      background:#000;
      color:#fff;
      padding:3px 6px;
      border-radius:4px;
      font-size:11px;
    }

    /* TITULOS */
    h2 {
      font-size:20px;
      color:var(--primary);
      margin-bottom:8px;
    }

    /* SERVIÇOS */
    .card {
      background:#fff;
      padding:15px;
      border-radius:8px;
      max-width:360px;
      margin:0 auto;
    }

    /* RESULTADOS */
    .resultados-section {
      padding-top:15px;
    }

    .resultados {
      display:flex;
      gap:8px;
      justify-content:center;
      margin-top:8px;
    }

    .resultados img {
      width:45%;
      border-radius:8px;
    }

    /* WHATSAPP PREMIUM */
    .whatsapp {
      position:fixed;
      bottom:18px;
      right:18px;
      width:65px;
      height:65px;
      border-radius:50%;
      background:#25D366;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      transition:0.3s;
      animation:pulse 2s infinite;
    }

    .whatsapp:hover {
      transform:scale(1.1);
    }

    .whatsapp img {
      width:34px;
      height:34px;
    }

    @keyframes pulse {
      0% { box-shadow:0 0 0 0 rgba(37,211,102,0.5); }
      70% { box-shadow:0 0 0 12px rgba(37,211,102,0); }
      100% { box-shadow:0 0 0 0 rgba(37,211,102,0); }
    }

  </style>
