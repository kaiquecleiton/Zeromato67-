<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero Mato</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1B5E20;
      --bg: #F4F6F3;
      --text: #1F1F1F;
      --cta: #FF9800;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    section {
      padding: 80px 20px;
      text-align: center;
    }

    /* HERO */
    .hero {
      background: linear-gradient(180deg, #F4F6F3 0%, #FFFFFF 100%);
      padding: 110px 20px;
    }

    .hero-content {
      max-width: 640px;
      margin: auto;
    }

    /* TÍTULO AJUSTADO */
    .hero h1 {
      font-size: 38px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 16px;
      color: #555;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    /* BOTÃO */
    .botao {
      display: inline-block;
      background: linear-gradient(135deg, #FF9800, #FF6F00);
      color: #fff;
      padding: 16px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(255,152,0,0.3);
      transition: 0.3s;
    }

    .botao:hover {
      transform: translateY(-3px);
    }

    /* SLIDER */
    .slider-novo {
      position: relative;
      width: 320px;
      margin: 50px auto 0;
    }

    .slider-novo img {
      width: 100%;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .slider-label {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
    }

    .prev, .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
    }

    .prev { left: -12px; }
    .next { right: -12px; }

    /* TÍTULOS */
    h2 {
      font-size: 26px;
      color: var(--primary);
      margin-bottom: 25px;
    }

    /* CARDS */
    .card {
      background: #fff;
      padding: 25px;
      border-radius: 14px;
      margin: 20px auto;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    /* RESULTADOS */
    .resultados {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .resultados img {
      width: 45%;
      border-radius: 12px;
    }

    /* WHATS */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .whatsapp img {
      width: 35px;
    }

    /* ANIMAÇÃO */
    .fade {
      opacity: 0;
      transform: translateY(20px);
      transition: 0.6s;
    }

    .fade.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero fade">
  <div class="hero-content">
    <h1>Seu terreno limpo, rápido e sem dor de cabeça</h1>
    <p>Atendimento rápido em Ribas do Rio Pardo e região</p>

    <a href="https://wa.me/5567981194737?text=Quero%20orçamento" class="botao">
      SOLICITAR ORÇAMENTO
    </a>

    <!-- SLIDER -->
    <div class="slider-novo">
      <img id="slideImg" src="antes.jpg">
      <div class="slider-label" id="slideLabel">Antes</div>

      <button class="prev" onclick="trocarSlide(-1)">‹</button>
      <button class="next" onclick="trocarSlide(1)">›</button>
    </div>
  </div>
</section>

<!-- SERVIÇOS -->
<section class="fade">
  <h2>Serviços</h2>
  <div class="card">
    Roçagem • Limpeza • Chácaras • Manutenção
  </div>
</section>

<!-- RESULTADOS -->
<section class="fade">
  <h2>Resultados</h2>
  <div class="resultados">
    <img src="antes.jpg">
    <img src="depois.jpg">
  </div>
</section>

<!-- PROVA -->
<section class="fade">
  <h2>Clientes satisfeitos</h2>
  <p>“Serviço rápido e bem feito. Recomendo!”</p>
</section>

<!-- WHATS -->
<a href="https://wa.me/5567981194737?text=Quero%20orçamento" class="whatsapp">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>
const imagens = ["antes.jpg", "depois.jpg"];
const textos = ["Antes", "Depois"];
let index = 0;

function trocarSlide(dir){
  index += dir;
  if(index < 0) index = imagens.length - 1;
  if(index >= imagens.length) index = 0;

  document.getElementById("slideImg").src = imagens[index];
  document.getElementById("slideLabel").innerText = textos[index];
}

/* animação */
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  fades.forEach(el => {
    if (el.getBoundingClientRect().top < window.innerHeight - 50) {
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
