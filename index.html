<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero Mato</title>

  <!-- Fonte melhor -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary:#1B5E20;
      --bg:#F4F6F3;
      --text:#1F1F1F;
      --cta:#FF9800;
    }

    body {
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    section {
      padding:50px 20px; /* REDUZIDO */
      text-align:center;
    }

    /* HERO */
    .hero {
      background: linear-gradient(180deg, #F4F6F3 0%, #FFFFFF 100%);
      padding:80px 20px;
    }

    .hero-content {
      max-width:500px; /* LIMITA LARGURA */
      margin:auto;
    }

    /* TÍTULO MAIS PROFISSIONAL */
    .hero h1 {
      font-size:30px;
      font-weight:600;
      line-height:1.4;
      letter-spacing:-0.3px;
      margin-bottom:12px;
    }

    .hero p {
      font-size:15px;
      color:#555;
      margin-bottom:20px;
    }

    /* BOTÃO */
    .botao {
      display:inline-block;
      background:linear-gradient(135deg,#FF9800,#FF6F00);
      color:#fff;
      padding:14px 24px;
      border-radius:8px;
      text-decoration:none;
      font-weight:600;
    }

    /* SLIDER */
    .slider-novo {
      width:280px;
      margin:30px auto 0;
    }

    .slider-novo img {
      width:100%;
      border-radius:12px;
    }

    .slider-label {
      position:absolute;
      margin-top:-35px;
      margin-left:10px;
      background:#000;
      color:#fff;
      padding:4px 8px;
      border-radius:5px;
      font-size:12px;
    }

    /* TÍTULOS */
    h2 {
      font-size:22px;
      color:var(--primary);
      margin-bottom:15px;
    }

    /* CARDS */
    .card {
      background:#fff;
      padding:18px;
      border-radius:10px;
      max-width:400px;
      margin:10px auto;
    }

    /* RESULTADOS */
    .resultados {
      display:flex;
      gap:10px;
      justify-content:center;
    }

    .resultados img {
      width:45%;
      border-radius:10px;
    }

    /* WHATS */
    .whatsapp {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      width:60px;
      height:60px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .whatsapp img { width:32px; }

  </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Seu terreno limpo com rapidez e serviço profissional</h1>
    <p>Atendimento em Ribas do Rio Pardo e região</p>

    <a href="https://wa.me/5567981194737?text=Quero%20orçamento" class="botao">
      Solicitar orçamento
    </a>

    <!-- SLIDER -->
    <div class="slider-novo">
      <img id="slideImg" src="antes.jpg">
      <div class="slider-label" id="slideLabel">Antes</div>
    </div>
  </div>
</section>

<!-- SERVIÇOS -->
<section>
  <h2>Serviços</h2>
  <div class="card">
    Roçagem • Limpeza de terrenos • Chácaras • Manutenção
  </div>
</section>

<!-- RESULTADOS -->
<section>
  <h2>Resultados</h2>
  <div class="resultados">
    <img src="antes.jpg">
    <img src="depois.jpg">
  </div>
</section>

<!-- WHATS -->
<a href="https://wa.me/5567981194737?text=Quero%20orçamento" class="whatsapp">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>
const imagens = ["antes.jpg", "depois.jpg"];
const textos = ["Antes", "Depois"];
let index = 0;

setInterval(() => {
  index++;
  if(index >= imagens.length) index = 0;

  document.getElementById("slideImg").src = imagens[index];
  document.getElementById("slideLabel").innerText = textos[index];
}, 2500);
</script>

</body>
</html>
